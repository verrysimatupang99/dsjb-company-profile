name: Deploy to Spaceship Hosting (FTP)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check FTP secrets present
        id: ftp
        run: |
          if [ -n "${{ secrets.FTP_SERVER }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FTP secrets belum diisi — deploy ke Spaceship dilewati. Isi FTP_SERVER/USERNAME/PASSWORD/REMOTE_DIR untuk mengaktifkan."
          fi

      - name: Deploy via FTP
        if: steps.ftp.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # Folder publik hosting. Default cPanel/LiteSpeed: public_html/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          # Jangan kirim file kerja/dev ke server publik:
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/test/**
            **/*.test.js
            jest.config.js
            package.json
            package-lock.json
            **/dsjb-story-*.png
            README.md
